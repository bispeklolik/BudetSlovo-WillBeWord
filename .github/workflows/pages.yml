# Веб-версия «Слова» на GitHub Pages: статическая сборка web/ (vite),
# публикация через официальный Pages-деплой (enablement включает Pages сам).
name: pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/shared/**'
      - 'vite.config.web.ts'
      - '.github/workflows/pages.yml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build:web
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web
      - id: deployment
        uses: actions/deploy-pages@v4
