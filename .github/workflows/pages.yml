# Веб-версия «Слова»: сборка web/ (vite) → публикация в ветку gh-pages.
# Создание ветки gh-pages само включает GitHub Pages (official-деплой через
# configure-pages требовал прав, которых нет у токена workflow).
name: pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/shared/**'
      - 'vite.config.web.ts'
      - '.github/workflows/pages.yml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build:web
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist-web
