appId: com.slovo.transcriber
productName: Слово
copyright: Слово
directories:
  output: dist
files:
  - out/**
  - package.json
win:
  target: nsis
  artifactName: Slovo-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Слово
  deleteAppDataOnUninstall: false
# Источник автообновлений и публикации релизов.
# owner будет проставлен реальным GitHub-логином перед публикацией.
publish:
  provider: github
  owner: PLACEHOLDER_OWNER
  repo: slovo
