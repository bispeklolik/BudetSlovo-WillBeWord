appId: com.slovo.transcriber
productName: Слово
copyright: Слово
directories:
  output: dist
files:
  - out/**
  - package.json
win:
  target: nsis
  icon: build/icon.ico
  artifactName: Slovo-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Слово
  deleteAppDataOnUninstall: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
# Источник автообновлений и публикации релизов.
# owner будет проставлен реальным GitHub-логином перед публикацией.
publish:
  provider: github
  owner: bispeklolik
  repo: BudetSlovo-WillBeWord
  releaseType: release
